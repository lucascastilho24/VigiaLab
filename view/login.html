<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VigiaLab - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #121214;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background-color: #1e1e24;
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .login-header h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-header h2 span {
            color: #ff6b00;
        }

        .login-header p {
            font-size: 14px;
            color: #a8a8b3;
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 14px;
            margin-bottom: 6px;
            color: #e1e1e6;
        }

        .input-group input {
            background-color: #121214;
            border: 1px solid #29292e;
            padding: 12px;
            border-radius: 4px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        .input-group input:focus {
            border-color: #ff6b00;
        }

        .btn-entrar {
            background-color: #ff6b00;
            color: #ffffff;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-entrar:hover {
            background-color: #e05e00;
}

        .login-footer {
            text-align: center;
            margin-top: 20px;
        }

        .login-footer p {
            font-size: 14px;
            color: #a8a8b3;
        }

        .login-footer a {
            color: #ff6b00;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h1>Faça Login</h1>
            <h2>no <span>VigiaLab</span></h2>
            <p>Quer reservar um horário hoje?</p>
        </div>

        <form action="#" method="POST">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>
            
            <div class="login-footer">
                <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            </div>
        </form>
    </div>

</body>
</html>
